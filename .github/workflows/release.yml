name: Release VieNeu TTS Native Runtime

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ORT_VERSION: "1.24.4"
  CUDA_VERSION: "12.4.1"

jobs:
  build:
    name: ${{ matrix.archive }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            backend: cpu
            package_flavor: cpu
            archive: vieneu-tts-linux-cpu.tar.gz
          - runner: ubuntu-22.04
            platform: linux
            backend: vulkan
            package_flavor: vulkan
            archive: vieneu-tts-linux-vulkan.tar.gz
          - runner: windows-2022
            platform: win
            backend: cpu
            package_flavor: cpu
            archive: vieneu-tts-win-cpu.zip
          - runner: windows-2022
            platform: win
            backend: vulkan
            package_flavor: vulkan
            archive: vieneu-tts-win-vulkan.zip
          - runner: macos-14
            platform: macos
            backend: metal
            package_flavor: metal
            archive: vieneu-tts-macos-metal.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout llama.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/llama.cpp
          path: llama.cpp
          fetch-depth: 1

      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install common build tools
        shell: pwsh
        run: |
          if ("${{ runner.os }}" -eq "Windows") {
            choco install ninja -y --no-progress
          } elseif ("${{ runner.os }}" -eq "Linux") {
            sudo apt-get update
            sudo apt-get install -y ninja-build build-essential
          } else {
            brew install ninja
          }
          cmake --version
          ninja --version

      - name: Install CUDA Toolkit
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network

      - name: Verify CUDA Toolkit
        if: matrix.backend == 'cuda'
        shell: pwsh
        run: |
          nvcc --version
          Write-Host "CUDA_PATH=$env:CUDA_PATH"

      - name: Install Vulkan SDK
        if: matrix.backend == 'vulkan'
        shell: pwsh
        run: |
          if ("${{ runner.os }}" -eq "Windows") {
            choco install vulkan-sdk -y --no-progress
            $sdk = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
            if (-not $sdk) { throw "Vulkan SDK was not installed under C:\VulkanSDK" }
            "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          } else {
            wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
            $codename = (lsb_release -cs)
            sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan.list "https://packages.lunarg.com/vulkan/lunarg-vulkan-$codename.list"
            sudo apt-get update
            sudo apt-get install -y vulkan-sdk
          }

      - name: Download ONNX Runtime SDK
        shell: pwsh
        run: |
          $version = "${{ env.ORT_VERSION }}"
          New-Item -ItemType Directory -Force -Path "ort_sdk" | Out-Null

          if ("${{ matrix.platform }}" -eq "win") {
            $name = "onnxruntime-win-x64-$version"
            $archive = "$name.zip"
          } elseif ("${{ matrix.platform }}" -eq "macos") {
            $name = "onnxruntime-osx-arm64-$version"
            $archive = "$name.tgz"
          } else {
            $name = "onnxruntime-linux-x64-$version"
            $archive = "$name.tgz"
          }

          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$version/$archive"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $archive

          if ($archive.EndsWith(".zip")) {
            Expand-Archive -Path $archive -DestinationPath "ort_sdk" -Force
          } else {
            tar -xzf $archive -C "ort_sdk"
          }

          $ortRoot = Resolve-Path (Join-Path "ort_sdk" $name)
          "ONNXRUNTIME_ROOT=$ortRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "ONNXRUNTIME_ROOT=$ortRoot"

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-B", "build",
            "-S", ".",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DVIENEU_PORTABLE_CPU=ON",
            "-DVIENEU_NATIVE_BACKEND=${{ matrix.backend }}",
            "-DVIENEU_SEA_G2P=ON",
            "-DVIENEU_LLAMA_DIR=llama.cpp",
            "-DONNXRUNTIME_ROOT=$env:ONNXRUNTIME_ROOT"
          )

          if ("${{ matrix.platform }}" -eq "macos") {
            $cmakeArgs += "-DCMAKE_OSX_ARCHITECTURES=arm64"
          }

          cmake @cmakeArgs

      - name: Build Project
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Package Runtime
        shell: pwsh
        run: |
          pwsh -File scripts/package-runtime.ps1 `
            -BuildDir "build" `
            -OutputDir "dist" `
            -OnnxRuntimeRoot "$env:ONNXRUNTIME_ROOT" `
            -RuntimeFlavor "cpu" `
            -NativeBackend "${{ matrix.backend }}" `
            -PackageFlavor "${{ matrix.package_flavor }}" `
            -PackagePlatform "${{ matrix.platform }}" `
            -OnnxRuntimeVersion "${{ env.ORT_VERSION }}" `
            -RuntimeVersion "${{ github.ref_name }}"

      - name: Upload Runtime Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          body: |
            Pre-compiled v3_native binaries for supported local backends.

            | Archive | OS | Backend | GPU |
            | --- | --- | --- | --- |
            | `vieneu-tts-linux-cpu.tar.gz` | Linux x86_64 | CPU | - |
            | `vieneu-tts-linux-vulkan.tar.gz` | Linux x86_64 | Vulkan | AMD / Intel / NVIDIA |
            | `vieneu-tts-win-cpu.zip` | Windows x64 | CPU | - |
            | `vieneu-tts-win-vulkan.zip` | Windows x64 | Vulkan | AMD / Intel / NVIDIA |
            | `vieneu-tts-macos-metal.tar.gz` | macOS ARM64 | Metal | Apple Silicon |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
